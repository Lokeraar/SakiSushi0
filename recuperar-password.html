<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Saki Sushi</title>
    <!-- Estilos CSS (Asumiendo que usas los mismos que en login) -->
    <link rel="stylesheet" href="../styles.css"> 
    <style>
        /* Estilos específicos para este formulario si son necesarios */
        .message-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none; /* Oculto por defecto */
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <h2>¿Olvidaste tu contraseña?</h2>
            <p>Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
        </div>

        <!-- Formulario de Recuperación -->
        <form id="recoverForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <button type="submit" id="btnSend" class="btn-primary">
                <span id="btnText">Enviar Enlace de Recuperación</span>
                <span id="btnSpinner" style="display:none;">Enviando...</span>
            </button>
        </form>

        <!-- Área de Mensajes -->
        <div id="messageBox" class="message-box"></div>

        <div class="login-footer">
            <a href="index.html">← Volver al Login</a>
        </div>
    </div>

    <!-- 1. Cargar configuración de Supabase PRIMERO -->
    <script src="../supabase-config.js"></script>
    
    <!-- 2. Cargar la lógica de recuperación DESPUÉS -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Referencias a los elementos del DOM
            const form = document.getElementById('recoverForm');
            const emailInput = document.getElementById('email');
            const btnSend = document.getElementById('btnSend');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const messageBox = document.getElementById('messageBox');

            // Función para mostrar mensajes
            function showMessage(msg, type) {
                messageBox.textContent = msg;
                messageBox.className = 'message-box ' + type;
                messageBox.style.display = 'block';
            }

            // Función para cambiar estado del botón (Cargando)
            function setLoading(isLoading) {
                if (isLoading) {
                    btnSend.classList.add('loading');
                    btnText.style.display = 'none';
                    btnSpinner.style.display = 'inline';
                } else {
                    btnSend.classList.remove('loading');
                    btnText.style.display = 'inline';
                    btnSpinner.style.display = 'none';
                }
            }

            // Escuchar el evento Submit del formulario
            form.addEventListener('submit', async function(e) {
                // IMPORTANTE: Prevenir el comportamiento por defecto (recarga/URL ?email=...)
                e.preventDefault(); 
                e.stopPropagation();

                const email = emailInput.value.trim();

                if (!email) {
                    showMessage('Por favor ingresa un correo electrónico.', 'error');
                    return;
                }

                // Validar formato básico de email
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showMessage('El formato del correo no es válido.', 'error');
                    return;
                }

                // Iniciar estado de carga
                setLoading(true);
                messageBox.style.display = 'none';

                try {
                    // Verificar que supabase esté disponible
                    if (typeof supabase === 'undefined') {
                        throw new Error('No se pudo cargar la configuración de Supabase.');
                    }

                    console.log('Intentando enviar recuperación a:', email);

                    // LLAMADA A SUPABASE
                    const { error } = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/nueva-password.html'
                    });

                    if (error) {
                        throw error;
                    }

                    // ÉXITO
                    showMessage('¡Correo enviado! Revisa tu bandeja de entrada (y spam).', 'success');
                    form.reset(); // Limpiar formulario
                    
                    // Opcional: Deshabilitar botón tras éxito
                    btnSend.disabled = true;
                    btnText.textContent = "Enviado";

                } catch (err) {
                    console.error('Error en recuperación:', err);
                    // Por seguridad, Supabase a veces da mensajes genéricos, pero mostramos el error real en consola
                    // y un mensaje amigable al usuario.
                    showMessage('Hubo un error al enviar el correo. Verifica que el correo esté registrado o intenta más tarde.', 'error');
                } finally {
                    // Quitar estado de carga (a menos que haya éxito, donde lo dejamos deshabilitado)
                    if (!btnSend.disabled) {
                        setLoading(false);
                    }
                }
            });
        });
    </script>
</body>
</html>
