<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Saki Sushi</title>
    <!-- Estilos CSS (Mismos que login) -->
    <style>
        :root {
            --primary: #D32F2F; /* Rojo Saki */
            --primary-dark: #B71C1C;
            --secondary: #212121; /* Negro suave */
            --accent: #FFC107; /* Dorado */
            --light: #F5F5F5;
            --dark: #121212;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --success: #4CAF50;
            --error: #F44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1579871494447-9811cf80d66c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            background: rgba(30, 30, 30, 0.95);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
            display: block;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
            display: block;
        }

        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Saki Sushi</div>
        <h2 style="margin-bottom: 10px;">Recuperar Contraseña</h2>
        <p class="subtitle">Ingresa tu correo de recuperación y te enviaremos un enlace.</p>

        <form id="recoverForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="email">
            </div>

            <button type="submit" class="btn" id="btnSubmit">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Enviar Enlace de Recuperación</span>
            </button>
        </form>

        <div id="message" class="message"></div>

        <a href="index.html" class="back-link">← Volver al Login</a>
    </div>

    <!-- Scripts -->
    <!-- 1. Cargar librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. Cargar tu configuración -->
    <script src="supabase-config.js"></script>

    <!-- 3. Lógica de recuperación -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('recoverForm');
            const emailInput = document.getElementById('email');
            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const messageDiv = document.getElementById('message');

            // Verificar que Supabase esté cargado
            if (typeof supabase === 'undefined') {
                showError('Error crítico: No se pudo cargar la configuración de Supabase.');
                return;
            }

            form.addEventListener('submit', async function(e) {
                // DETENER el comportamiento por defecto del formulario
                e.preventDefault(); 
                e.stopPropagation();

                const email = emailInput.value.trim();

                if (!email) {
                    showError('Por favor ingresa un correo electrónico.');
                    return;
                }

                // Validar formato básico
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('El formato del correo no es válido.');
                    return;
                }

                // UI: Estado de carga
                setLoading(true);
                hideMessage();

                try {
                    // LLAMADA A SUPABASE
                    const { error } = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/nueva-password.html'
                    });

                    if (error) {
                        throw error;
                    }

                    // ÉXITO
                    showSuccess('¡Correo enviado! Revisa tu bandeja de entrada (y spam). El enlace expira en 1 hora.');
                    form.style.display = 'none'; // Ocultar formulario
                    
                } catch (err) {
                    console.error('Error en recuperación:', err);
                    // Por seguridad, Supabase a veces da mensajes genéricos, pero mostramos el error real en consola
                    showError('No se pudo enviar el correo. Verifica que el correo esté registrado correctamente o intenta más tarde.');
                } finally {
                    setLoading(false);
                }
            });

            function setLoading(isLoading) {
                if (isLoading) {
                    btnSubmit.disabled = true;
                    btnText.textContent = 'Enviando...';
                    spinner.style.display = 'block';
                } else {
                    btnSubmit.disabled = false;
                    btnText.textContent = 'Enviar Enlace de Recuperación';
                    spinner.style.display = 'none';
                }
            }

            function showSuccess(msg) {
                messageDiv.textContent = msg;
                messageDiv.className = 'message success';
            }

            function showError(msg) {
                messageDiv.textContent = msg;
                messageDiv.className = 'message error';
            }

            function hideMessage() {
                messageDiv.className = 'message';
                messageDiv.textContent = '';
            }
        });
    </script>
</body>
</html>
