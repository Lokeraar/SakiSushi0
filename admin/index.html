<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saki Sushi Admin - Test</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">
  <h1>Test Alpine</h1>
  <div x-show="!loggedIn">
    <h2>Login</h2>
    <input type="password" x-model="loginPassword" placeholder="Contraseña">
    <button @click="login">Ingresar</button>
  </div>
  <div x-show="loggedIn">
    <h2>Panel Admin</h2>
    <button @click="logout">Salir</button>
  </div>

  <script>
    function app() {
      return {
        loggedIn: false,
        loginPassword: '',
        init() {
          console.log('App iniciada');
          const token = sessionStorage.getItem('admin_jwt_token');
          if (token) this.loggedIn = true;
        },
        login() {
          if (this.loginPassword === 'admin123') {
            this.loggedIn = true;
            sessionStorage.setItem('admin_jwt_token', 'test');
            alert('Login exitoso');
          } else {
            alert('Contraseña incorrecta');
          }
        },
        logout() {
          this.loggedIn = false;
          sessionStorage.removeItem('admin_jwt_token');
        }
      };
    }
  </script>
</body>
</html>
